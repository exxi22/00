<main class="galaxy-container">

    <article class="galaxy-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/63/Andromeda_Galaxy_%28with_h-alpha%29.jpg">
        <h2>Андромеда</h2>
        <p>
        Андромеда — найближча велика галактика до Чумацького Шляху.  
        Вона містить понад трильйон зірок.  
        Її можна побачити неозброєним оком у темному небі.  
        Вона рухається прямо до нашої галактики.  
        Через мільярди років вони зіткнуться.  
        Це створить нову велику галактику.  
        Вона має спіральну форму.  
        У ній багато туманностей.  
        Там активно народжуються нові зорі.  
        Це одна з найвивченіших галактик.
        </p>
    </article>

    <article class="galaxy-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/9f/Whirlpool_Galaxy_Hubble.jpg">
        <h2>Вир (Whirlpool)</h2>
        <p>
        Галактика Вир має чітку спіральну структуру.  
        Вона взаємодіє з сусідньою галактикою.  
        Через це утворюються нові зорі.  
        Вона знаходиться в сузір’ї Гончих Псів.  
        Її форма нагадує водяний вир.  
        Це дуже яскрава галактика.  
        Вона активно досліджується телескопами.  
        Має багато пилу і газу.  
        В ній часто відбуваються зоряні вибухи.  
        Це класичний приклад спіральної галактики.
        </p>
    </article>

    <article class="galaxy-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Sombrero_Galaxy.jpg">
        <h2>Сомбреро</h2>
        <p>
        Галактика Сомбреро має яскраве ядро.  
        Вона отримала назву через форму капелюха.  
        Її оточує темна пилова смуга.  
        Вона знаходиться у сузір’ї Діви.  
        Це дуже масивна галактика.  
        В її центрі є велика чорна діра.  
        Вона випромінює сильне світло.  
        Її легко побачити через телескоп.  
        Вона має старі й молоді зорі.  
        Це одна з найкрасивіших галактик.
        </p>
    </article>

    <article class="galaxy-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0e/Triangulum_Galaxy.jpg">
        <h2>Трикутник</h2>
        <p>
        Галактика Трикутник є однією з найменших великих галактик.  
        Вона входить у Місцеву групу галактик.  
        Вона має спіральну форму.  
        У ній дуже багато газу.  
        Там активно утворюються зорі.  
        Її можна побачити в невеликі телескопи.  
        Вона пов’язана гравітаційно з Андромедою.  
        Вона має слабке ядро.  
        Її структура досить проста.  
        Це спокійна, але активна галактика.
        </p>
    </article>

    <article class="galaxy-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Cigar_Galaxy_M82.jpg">
        <h2>Сигара</h2>
        <p>
        Галактика Сигара має видовжену форму.  
        Вона дуже активно утворює зорі.  
        Це називається зоряний вибух.  
        Вона знаходиться поруч з М81.  
        Взаємодія з нею спричинила активність.  
        В ній багато пилу.  
        Вона випромінює сильне інфрачервоне світло.  
        В центрі відбуваються вибухові процеси.  
        Вона дуже яскрава в телескопах.  
        Це одна з найактивніших галактик.
        </p>
    </article>
